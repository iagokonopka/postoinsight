<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostoInsight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    /* ── Design Tokens ───────────────────────────────────────── */
    :root {
      --color-primary:          #0073BB;
      --color-primary-hover:    #005F99;
      --color-primary-subtle:   #F0F7FC;
      --color-bg:               #FFFFFF;
      --color-bg-subtle:        #F2F3F3;
      --color-bg-muted:         #EAEDED;
      --color-border:           #D5DBDB;
      --color-border-subtle:    #EAEDED;
      --color-text:             #16191F;
      --color-text-muted:       #545B64;
      --color-text-subtle:      #879596;
      --color-text-inverse:     #FFFFFF;
      --color-success:          #1D8102;
      --color-success-subtle:   #EBF6E8;
      --color-warning:          #8D6708;
      --color-warning-subtle:   #FEF9EC;
      --color-danger:           #D13212;
      --color-danger-subtle:    #FDF3F1;
      --color-info:             #0073BB;
      --color-info-subtle:      #F0F7FC;
      --color-topbar:           #232F3E;
      --color-topbar-muted:     #8D9199;
      --color-cta:              #EC7211;
      --color-segment-combustivel:   #0073BB;
      --color-segment-lubrificantes: #6B40C4;
      --color-segment-servicos:      #1D8102;
      --color-segment-conveniencia:  #EC7211;
      --font-sans:  'DM Sans', system-ui, sans-serif;
      --font-mono:  'Source Sans 3', system-ui, sans-serif;
      --text-xs:    11px;
      --text-sm:    13px;
      --text-base:  13px;
      --text-md:    14px;
      --text-lg:    18px;
      --text-xl:    24px;
      --text-2xl:   30px;
      --text-heading: 18px;
      --space-1:  4px;
      --space-2:  8px;
      --space-3:  12px;
      --space-4:  16px;
      --space-5:  20px;
      --space-6:  24px;
      --space-8:  32px;
      --space-12: 48px;
      --radius-sm: 3px;
      --radius-md: 4px;
      --radius-lg: 6px;
      --radius-xl: 8px;
      --border-width: 1px;
      --shadow-xs: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-sm: 0 2px 6px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.10), 0 4px 8px rgba(0,0,0,0.05);
      --table-row-height: 40px;
      --sidebar-width: 220px;
      --topbar-height: 40px;
    }
    [data-theme="dark"] {
      --color-bg:             #0D1117;
      --color-bg-subtle:      #161B22;
      --color-bg-muted:       #21262D;
      --color-border:         #30363D;
      --color-border-subtle:  #21262D;
      --color-text:           #E6EDF3;
      --color-text-muted:     #7D8590;
      --color-text-subtle:    #484F58;
      --color-topbar:         #161B22;
      --color-topbar-muted:   #7D8590;
      --color-text-inverse:   #0F172A;
      --color-primary-subtle: #1e3a8a30;
      --color-success-subtle: #14532d30;
      --color-warning-subtle: #78350f30;
      --color-danger-subtle:  #7f1d1d30;
      --color-info-subtle:    #0c4a6e30;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.30);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.25);
    }
    /* ── Base ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-sans);
      font-size: var(--text-base);
      -webkit-font-smoothing: antialiased;
    }
    button { cursor: pointer; font-family: inherit; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="data.js"></script>
  <script type="text/babel" src="layout.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="page-login.jsx"></script>
  <script type="text/babel" src="page-vendas.jsx"></script>
  <script type="text/babel" src="page-combustivel.jsx"></script>
  <script type="text/babel" src="page-conveniencia.jsx"></script>
  <script type="text/babel" src="page-dre.jsx"></script>
  <script type="text/babel" src="page-sync.jsx"></script>
  <script type="text/babel" src="page-settings.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

      <rect x="22" y="4" width="54" height="10" rx="2" fill="#EFF6FF"/>
      <rect x="22" y="18" width="25" height="16" rx="2" fill="#E2E8F0"/>
      <rect x="51" y="18" width="25" height="16" rx="2" fill="#E2E8F0"/>
      <rect x="22" y="38" width="54" height="14" rx="2" fill="#E2E8F0"/>
      <rect x="26" y="42" width="18" height="2" rx="1" fill="#2563EB" opacity="0.8"/>
      <rect x="26" y="46" width="11" height="2" rx="1" fill="#16A34A" opacity="0.6"/>

</body>
</html>
