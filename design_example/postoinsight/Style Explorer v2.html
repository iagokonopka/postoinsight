// ─── Mini SVG Chart ───────────────────────────────────────────────────────────
function LineChart({ data, xKey, yKeys, colors, height = 160, t }) {
  const W = 900, H = height;
  const P = { t:12, r:8, b:24, l:64 };
  const cW = W-P.l-P.r, cH = H-P.t-P.b;
  const [hover, setHover] = React.useState(null);
  if (!data || !data.length) return null;

  const allVals = data.flatMap(d => yKeys.map(k => d[k]||0));
  const maxV = Math.max(...allVals) * 1.12 || 1;
  const xp = i => P.l + (i/(data.length-1))*cW;
  const yp = v => P.t + cH - (v/maxV)*cH;
  const yTicks = [0,0.25,0.5,0.75,1].map(r => r*maxV);

  // support both theme shapes
  const tc = t.content || t.c || {};
  const fontSans = t.font || t.fontBody;
  const fontMono = t.mono || t.fontMono;

  return (
    <div style={{ position:'relative' }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width:'100%', height:H, display:'block' }}
        onMouseLeave={() => setHover(null)}>
        <defs>
          {yKeys.map((k,ki) => (
            <linearGradient key={k} id={`ag-${k}-${t.id}`} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={colors[ki]} stopOpacity="0.15"/>
              <stop offset="100%" stopColor={colors[ki]} stopOpacity="0"/>
            </linearGradient>
          ))}
        </defs>

        {/* grid */}
        {yTicks.map((v,i) => (
          <g key={i}>
            <line x1={P.l} y1={yp(v)} x2={W-P.r} y2={yp(v)}
              stroke={tc.border} strokeWidth="1" strokeDasharray="3 4"/>
            <text x={P.l-6} y={yp(v)+4} textAnchor="end" fontSize="9"
              fill={tc.muted} fontFamily={t.mono}>{fBRL(v)}</text>
          </g>
        ))}

        {/* areas + lines */}
        {yKeys.map((k,ki) => {
          const pts = data.map((d,i) => [xp(i), yp(d[k]||0)]);
          const lp = pts.map((p,i) => `${i===0?'M':'L'}${p[0]},${p[1]}`).join(' ');
          const ap = lp+` L${pts[pts.length-1][0]},${P.t+cH} L${pts[0][0]},${P.t+cH} Z`;
          return (
            <g key={k}>
              <path d={ap} fill={`url(#ag-${k}-${t.id})`}/>
              <path d={lp} fill="none" stroke={colors[ki]} strokeWidth="1.5"
                strokeLinecap="round" strokeLinejoin="round"/>
            </g>
          );
        })}

        {/* x labels */}
        {data.map((d,i) => {
          if (data.length > 14 && i % Math.ceil(data.length/10) !== 0) return null;
          return <text key={i} x={xp(i)} y={H-5} textAnchor="middle" fontSize="9"
            fill={tc.muted} fontFamily={fontMono}>{d[xKey]}</text>;
        })}

        {/* hover areas */}
        {data.map((d,i) => (
          <rect key={i} x={xp(i)-(cW/data.length)/2} y={P.t} width={cW/data.length} height={cH}
            fill="transparent" onMouseEnter={() => setHover({i, x:xp(i), d})}/>
        ))}

        {hover && (
          <g>
            <line x1={hover.x} y1={P.t} x2={hover.x} y2={P.t+cH}
              stroke={tc.muted} strokeWidth="1" strokeDasharray="2 3"/>
            {yKeys.map((k,ki) => (
              <circle key={k} cx={hover.x} cy={yp(hover.d[k]||0)} r="3"
                fill={colors[ki]} stroke={tc.card} strokeWidth="2"/>
            ))}
          </g>
        )}
      </svg>

      {hover && (
        <div style={{
          position:'absolute', top:10, left:P.l+4,
          background: tc.card,
          border:`1px solid ${tc.border}`,
          borderRadius: t.radiusSm || t.c?.radiusSm || '3px',
          padding:'7px 10px', fontSize:11,
          pointerEvents:'none', whiteSpace:'nowrap',
          boxShadow:'0 4px 12px rgba(0,0,0,.15)',
          fontFamily: fontSans,
          color: tc.text,
        }}>
          <div style={{ fontWeight:700, marginBottom:4, fontSize:11 }}>{hover.d[xKey]}</div>
          {yKeys.map((k,ki) => (
            <div key={k} style={{ display:'flex', gap:8, alignItems:'center', marginBottom:2 }}>
              <span style={{ width:8, height:2, background:colors[ki], display:'inline-block', borderRadius:1 }}/>
              <span style={{ color:tc.muted, fontSize:10 }}>{k==='receita_bruta'?'Receita':'Margem'}:</span>
              <span style={{ fontFamily:fontMono, fontWeight:600, fontSize:10 }}>{fBRL(hover.d[k])}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── Horizontal bar ───────────────────────────────────────────────────────────
function HBar({ pct, color, t }) {
  const tc = t.content || t.c || {};
  return (
    <div style={{ height:3, background:tc.borderSub, borderRadius:1, flex:1 }}>
      <div style={{ height:'100%', width:pct+'%', background:color, borderRadius:1 }}/>
    </div>
  );
}

// ─── KPI Card ─────────────────────────────────────────────────────────────────
function KpiCard({ label, value, sub, delta, format, accent, t }) {
  const tc = t.content;
  const formatted = format==='pct' ? fPct(value,2)
    : format==='num' ? fNum(value)
    : fBRL(value);

  return (
    <div style={{
      flex:1, minWidth:0,
      background: tc.card,
      border: `1px solid ${tc.border}`,
      borderTop: accent ? `2px solid ${accent}` : `1px solid ${tc.border}`,
      borderRadius: t.radius,
      padding: '16px 18px',
    }}>
      <div style={{
        fontSize:10, color:tc.muted, textTransform:'uppercase',
        letterSpacing:'.08em', fontWeight:600, marginBottom:8,
        fontFamily: t.font,
      }}>{label}</div>
      <div style={{
        fontSize:22, fontWeight:700, color:tc.text,
        letterSpacing:'-0.03em', fontFamily:t.mono,
        marginBottom:6, lineHeight:1,
      }}>{formatted}</div>
      <div style={{ display:'flex', gap:8, alignItems:'center' }}>
        {sub && <span style={{ fontSize:10, color:tc.subtle, fontFamily:t.font }}>{sub}</span>}
        {delta != null && (
          <span style={{
            fontSize:10, fontWeight:700,
            color: delta>=0 ? tc.success : tc.danger,
            background: delta>=0 ? tc.successBg : tc.dangerBg,
            padding:'2px 6px', borderRadius:t.radiusSm,
            fontFamily: t.font,
          }}>{(delta>=0?'+':'')+fNum(delta,1)+'%'}</span>
        )}
      </div>
    </div>
  );
}

}

        <KpiCard label="Margem Bruta"   value={r.totais.margem_bruta}   delta={9.1}  accent={t.seg[2]} t={t}/>
        <KpiCard label="Margem %"       value={r.totais.margem_pct}     format="pct" t={t}/>
        <KpiCard label="Itens Vendidos" value={r.totais.qtd_itens}      format="num" sub="transações" t={t}/>
      </div>

      {/* Chart */}
      <div style={{ background:tc.card, border:`1px solid ${tc.border}`, borderRadius:t.radius, overflow:'hidden' }}>
        <SectionHeader title="Evolução de Receita — Abril 2026" t={t}
          right={
            <div style={{ display:'flex', background:tc.bg, borderRadius:t.radiusSm, padding:2, gap:1 }}>
              {['dia','semana','mês'].map(g => (
                <button key={g} onClick={() => setGran(g)} style={{
                  padding:'3px 10px', borderRadius:t.radiusSm, border:'none',
                  cursor:'pointer', fontFamily:t.font, fontSize:10, fontWeight:gran===g?700:400,
                  background: gran===g ? tc.card : 'transparent',
                  color: gran===g ? tc.text : tc.muted,
                  boxShadow: gran===g ? '0 1px 3px rgba(0,0,0,.08)' : 'none',
                  transition:'all .12s',
                }}>{g.charAt(0).toUpperCase()+g.slice(1)}</button>
              ))}

          }

// ─── Page: DRE ───────────────────────────────────────────────────────────────
function PageDRE({ t }) {
  const tc = t.content;
  const rows = [
    { label:'Receita Bruta',    key:'receita_bruta',   bold:false, indent:0 },
    { label:'(-) Descontos',    key:'descontos',       bold:false, indent:1, neg:true },
    { label:'Receita Líquida',  key:'receita_liquida', bold:true,  indent:0 },
    { label:'(-) CMV',          key:'cmv',             bold:false, indent:1, neg:true },
    { label:'Margem Bruta',     key:'margem_bruta',    bold:true,  indent:0, highlight:true },
    { label:'Margem %',         key:'margem_pct',      bold:true,  indent:0, pct:true },
  ];
  const segs = ['combustivel','lubrificantes','servicos','conveniencia','_total'];
  const segLabels = { combustivel:'Combustível', lubrificantes:'Lubrificantes', servicos:'Serviços', conveniencia:'Conveniência', _total:'Total' };
  const mes = '2026-04';
  const data = window.MOCK.dre?.por_mes?.[mes] || {};

  return (
    <div style={{ padding:'18px 24px', background:tc.bg, flex:1, overflowY:'auto', minHeight:0 }}>
      <div style={{ background:tc.card, border:`1px solid ${tc.border}`, borderRadius:t.radius, overflow:'hidden' }}>
        <SectionHeader title="DRE Mensal — Abril 2026" t={t}/>

        {/* col headers */}
        <div style={{
          display:'grid', gridTemplateColumns:`200px repeat(${segs.length}, 1fr)`,
          padding:'0 18px', height:34, alignItems:'center', gap:0,
          borderBottom:`1px solid ${tc.border}`, background:tc.bg,
        }}>
          <div/>
          {segs.map(s => (
            <div key={s} style={{ textAlign:'right', fontSize:9, fontWeight:s==='_total'?700:600, color:s==='_total'?tc.text:tc.muted, textTransform:'uppercase', letterSpacing:'.07em', fontFamily:t.font, paddingRight:18 }}>{segLabels[s]}</div>
          ))}
        </div>

        {rows.map((row, ri) => {
          const isHL = row.highlight;
          return (
            <div key={row.key} style={{
              display:'grid', gridTemplateColumns:`200px repeat(${segs.length}, 1fr)`,
              padding:'0 18px', height: row.bold ? 44 : 38, alignItems:'center', gap:0,
              borderBottom:`1px solid ${tc.borderSub}`,
              background: isHL ? tc.accentBg : ri%2===0 ? 'transparent' : tc.bg+'80',
            }}>
              <div style={{
                fontSize: row.bold ? 12 : 11,
                fontWeight: row.bold ? 700 : 400,
                color: isHL ? tc.accent : tc.text,
                paddingLeft: row.indent * 14,
                fontFamily: t.font,
              }}>{row.label}</div>
              {segs.map(s => {
                const seg = data[s] || {};
                const val = seg[row.key] ?? 0;
                const display = row.pct ? fPct(val,2) : fBRL(val);
                return (
                  <div key={s} style={{
                    textAlign:'right', paddingRight:18,
                    fontSize: row.bold ? 13 : 12,
                    fontWeight: row.bold ? 700 : 400,
                    fontFamily: t.mono,
                    color: isHL
                      ? (s==='_total' ? tc.accent : tc.success)
                      : row.neg
                        ? tc.danger
                        : s==='_total' ? tc.text : tc.muted,
                  }}>{display}</div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Page: Sincronização ─────────────────────────────────────────────────────
function PageSync({ t }) {
  const tc = t.content;
  const sync = window.MOCK.sync;
  const locs = window.MOCK.LOCATIONS;
  const statusColor = { online: tc.success, warning: tc.warning, failed: tc.danger };
  const statusBg    = { online: tc.successBg, warning: tc.warningBg, failed: tc.dangerBg };

  return (
    <div style={{ padding:'18px 24px', background:tc.bg, flex:1, overflowY:'auto', minHeight:0, display:'flex', flexDirection:'column', gap:14 }}>

      {/* Status cards */}
      <div style={{ display:'flex', gap:10 }}>
        {locs.map(loc => (
          <div key={loc.id} style={{ flex:1, background:tc.card, border:`1px solid ${tc.border}`, borderLeft:`3px solid ${statusColor[loc.status]||tc.muted}`, borderRadius:t.radius, padding:'14px 16px' }}>
            <div style={{ fontSize:11, fontWeight:700, color:tc.text, fontFamily:t.font, marginBottom:4 }}>{loc.nome}</div>
            <div style={{ display:'inline-flex', alignItems:'center', gap:5, fontSize:10, fontWeight:600, color:statusColor[loc.status], background:statusBg[loc.status], padding:'2px 8px', borderRadius:t.radiusSm, fontFamily:t.font }}>
              <span style={{ width:5, height:5, borderRadius:'50%', background:statusColor[loc.status], display:'inline-block' }}/>
              {loc.status==='online'?'Online':loc.status==='warning'?'Alerta':'Offline'}
            </div>
          </div>
        ))}
      </div>

      {/* Histórico */}
      <div style={{ background:tc.card, border:`1px solid ${tc.border}`, borderRadius:t.radius, overflow:'hidden' }}>
        <SectionHeader title="Histórico de Sincronização" t={t}/>
        <div style={{ display:'grid', gridTemplateColumns:'140px 100px 140px 100px 80px 1fr', padding:'0 18px', height:32, alignItems:'center', gap:16, borderBottom:`1px solid ${tc.border}`, background:tc.bg }}>
          {['Unidade','Status','Início','Duração','Registros','Detalhe'].map(h => (
            <div key={h} style={{ fontSize:9, fontWeight:700, color:tc.muted, textTransform:'uppercase', letterSpacing:'.08em', fontFamily:t.font }}>{h}</div>
          ))}
        </div>
        {(sync?.historico||[]).map((h,i) => (
          <div key={h.id} style={{
            display:'grid', gridTemplateColumns:'140px 100px 140px 100px 80px 1fr',
            padding:'0 18px', height:t.rowH, alignItems:'center', gap:16,
            borderBottom: i < (sync.historico.length-1) ? `1px solid ${tc.borderSub}` : 'none',
          }}>
            <div style={{ fontSize:12, color:tc.text, fontFamily:t.font }}>{h.location}</div>
            <div>
              <span style={{ fontSize:10, fontWeight:600, color:statusColor[h.status]||tc.muted, background:statusBg[h.status]||tc.bg, padding:'2px 7px', borderRadius:t.radiusSm, fontFamily:t.font }}>
                {h.status==='success'?'OK':h.status==='failed'?'Falhou':'Running'}
              </span>
            </div>
            <div style={{ fontSize:11, color:tc.muted, fontFamily:t.mono }}>{new Date(h.inicio).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</div>
            <div style={{ fontSize:11, color:tc.muted, fontFamily:t.mono }}>{h.duracao}</div>
            <div style={{ fontSize:11, fontFamily:t.mono, color:tc.text }}>{fNum(h.registros)}</div>
            <div style={{ fontSize:10, color:tc.muted, fontFamily:t.font, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{h.erro||'—'}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── AWS breadcrumb + page title ──────────────────────────────────────────────
function BreadcrumbAWS({ t, page }) {
  const tc = t.content;
  const crumbs = {
    dashboard:   ['PostoInsight', 'Visão Geral de Vendas'],
    combustivel: ['PostoInsight', 'Visão Geral de Vendas'],
    dre:         ['PostoInsight', 'Financeiro', 'DRE Mensal'],
    sync:        ['PostoInsight', 'Sistema', 'Sincronização'],
  };
  const titles = {
    dashboard:   'Visão Geral de Vendas',
    combustivel: 'Visão Geral de Vendas',
    dre:         'DRE Mensal',
    sync:        'Sincronização',
  };
  const parts = crumbs[page] || crumbs.dashboard;

  return (
    <div style={{ padding: '10px 20px 0', fontFamily: t.font }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 5, marginBottom: 6 }}>
        {parts.map((p, i) => (
          <React.Fragment key={i}>
            {i > 0 && <span style={{ fontSize: 11, color: tc.muted }}>›</span>}
            <span style={{
              fontSize: 11,
              color: i === parts.length - 1 ? tc.muted : tc.accent,
              fontWeight: i === parts.length - 1 ? 400 : 400,
              cursor: i < parts.length - 1 ? 'pointer' : 'default',
            }}>{p}</span>
          </React.Fragment>
        ))}
      </div>
      <h1 style={{ fontSize: 20, fontWeight: 700, color: tc.text, letterSpacing: '-.01em', marginBottom: 14 }}>
        {titles[page]}
      </h1>
    </div>
  );
}

// ─── AWS Page: DRE ────────────────────────────────────────────────────────────
function PageDREAWS({ t }) {
  const tc = t.content;
  const rows = [
    { label:'Receita Bruta',   key:'receita_bruta',   bold:false, indent:0 },
    { label:'(-) Descontos',   key:'descontos',       bold:false, indent:1, neg:true },
    { label:'Receita Líquida', key:'receita_liquida', bold:true,  indent:0 },
    { label:'(-) CMV',         key:'cmv',             bold:false, indent:1, neg:true },
    { label:'Margem Bruta',    key:'margem_bruta',    bold:true,  indent:0, highlight:true },
    { label:'Margem %',        key:'margem_pct',      bold:true,  indent:0, pct:true },
  ];
  const segs = ['combustivel','lubrificantes','servicos','conveniencia','_total'];
  const segLabels = { combustivel:'Combustível', lubrificantes:'Lubrificantes', servicos:'Serviços', conveniencia:'Conveniência', _total:'Total' };
  const data = window.MOCK.dre?.por_mes?.['2026-04'] || {};

  return (
    <div style={{ background: tc.card, border: `1px solid ${tc.border}` }}>
      <div style={{ padding: '10px 16px', borderBottom: `1px solid ${tc.border}`, background: tc.bg }}>
        <span style={{ fontSize: 13, fontWeight: 700, color: tc.text }}>Demonstrativo de Resultado — Abril 2026</span>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: `220px repeat(${segs.length}, 1fr)`, padding: '0 16px', height: 34, alignItems: 'center', borderBottom: `2px solid ${tc.border}`, background: tc.bg }}>
        <div/>
        {segs.map(s => (
          <div key={s} style={{ textAlign: 'right', fontSize: 11, fontWeight: s==='_total'?700:600, color: s==='_total'?tc.text:tc.muted, paddingRight: 16 }}>{segLabels[s]}</div>
        ))}
      </div>
      {rows.map((row, ri) => (
        <div key={row.key} style={{
          display: 'grid', gridTemplateColumns: `220px repeat(${segs.length}, 1fr)`,
          padding: '0 16px', height: row.bold ? 42 : 36, alignItems: 'center',
          borderBottom: `1px solid ${tc.borderSub}`,
          background: row.highlight ? tc.successBg : ri%2===0 ? tc.card : '#FAFAFA',
        }}>
          <div style={{ fontSize: row.bold ? 13 : 12, fontWeight: row.bold ? 700 : 400, color: row.highlight ? tc.success : tc.text, paddingLeft: row.indent*14 }}>{row.label}</div>
          {segs.map(s => {
            const val = (data[s]||{})[row.key] ?? 0;
            return (
              <div key={s} style={{ textAlign: 'right', paddingRight: 16, fontSize: row.bold ? 13 : 12, fontWeight: row.bold ? 700 : 400, fontFamily: t.mono, color: row.highlight ? tc.success : row.neg ? tc.danger : s==='_total' ? tc.text : tc.muted }}>
                {row.pct ? fPct(val,2) : fBRL(val)}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ─── AWS Page: Sync ───────────────────────────────────────────────────────────
function PageSyncAWS({ t }) {
  const tc = t.content;
  const sync = window.MOCK.sync;
  const locs = window.MOCK.LOCATIONS;
  const sColor = { online: tc.success, warning: tc.warning, failed: tc.danger };
  const sBg    = { online: tc.successBg, warning: tc.warningBg, failed: tc.dangerBg };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      {/* Status cards */}
      <div style={{ display: 'flex', gap: 12 }}>
        {locs.map(loc => (
          <div key={loc.id} style={{ flex: 1, background: tc.card, border: `1px solid ${tc.border}`, borderLeft: `4px solid ${sColor[loc.status]||tc.muted}`, padding: '12px 14px' }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: tc.text, marginBottom: 5 }}>{loc.nome}</div>
            <span style={{ fontSize: 11, fontWeight: 700, color: sColor[loc.status], background: sBg[loc.status], padding: '2px 8px' }}>
              {loc.status==='online'?'● Online':loc.status==='warning'?'⚠ Alerta':'✕ Offline'}
            </span>
          </div>
        ))}
      </div>

      {/* History table */}
      <div style={{ background: tc.card, border: `1px solid ${tc.border}` }}>
        <div style={{ padding: '10px 16px', borderBottom: `1px solid ${tc.border}`, background: tc.bg }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: tc.text }}>Histórico de Sincronização</span>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '150px 90px 150px 90px 80px 1fr', padding: '0 16px', height: 32, alignItems: 'center', gap: 12, borderBottom: `2px solid ${tc.border}`, background: tc.bg }}>
          {['Unidade','Status','Início','Duração','Registros','Erro'].map(h => (
            <div key={h} style={{ fontSize: 11, fontWeight: 700, color: tc.muted }}>{h}</div>
          ))}
        </div>
        {(sync?.historico||[]).map((h, i) => (
          <div key={h.id} style={{
            display: 'grid', gridTemplateColumns: '150px 90px 150px 90px 80px 1fr',
            padding: '0 16px', height: t.rowH, alignItems: 'center', gap: 12,
            borderBottom: i < sync.historico.length-1 ? `1px solid ${tc.borderSub}` : 'none',
            background: i%2===0 ? tc.card : '#FAFAFA',
          }}>
            <div style={{ fontSize: 13, color: tc.accent, cursor: 'pointer' }}>{h.location}</div>
            <span style={{ fontSize: 11, fontWeight: 700, color: sColor[h.status]||tc.muted, background: sBg[h.status]||'transparent', padding: '2px 7px', display: 'inline-block' }}>
              {h.status==='success'?'OK':h.status==='failed'?'Falhou':'Running'}
            </span>
            <div style={{ fontSize: 12, color: tc.muted, fontFamily: t.mono }}>{new Date(h.inicio).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</div>
            <div style={{ fontSize: 12, color: tc.muted, fontFamily: t.mono }}>{h.duracao}</div>
            <div style={{ fontSize: 12, fontFamily: t.mono, color: tc.text }}>{fNum(h.registros)}</div>
            <div style={{ fontSize: 11, color: tc.muted, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{h.erro||'—'}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Table D (checkbox col, sortable headers, row highlight, filter) ──────────
function TableD({ t, title, count, columns, rows, getKey }) {
  const tc = t.c;
  const [selected, setSelected] = React.useState(null);
  const [filter, setFilter] = React.useState('');
  const filtered = filter ? rows.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(filter.toLowerCase()))) : rows;
  const colTemplate = `32px ${columns.map(c => c.width||'1fr').join(' ')}`;

  return (
    <div style={{ background:tc.card, border:`1px solid ${tc.border}`, borderRadius:tc.radius, overflow:'hidden', marginBottom:16 }}>
      {/* Table header */}
      <div style={{ padding:'10px 16px', borderBottom:`1px solid ${tc.border}`, display:'flex', alignItems:'center', justifyContent:'space-between', background:tc.bg }}>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <span style={{ fontSize:14, fontWeight:700, color:tc.text, fontFamily:t.fontTitle }}>{title}</span>
          <span style={{ fontSize:12, color:tc.muted, fontFamily:t.fontBody }}>({count})</span>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={tc.accent} strokeWidth="2" style={{ cursor:'pointer' }}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          {/* pagination */}
          <div style={{ display:'flex', alignItems:'center', gap:4, fontSize:12, color:tc.muted, fontFamily:t.fontBody }}>
            <button style={{ width:24, height:24, border:`1px solid ${tc.border}`, background:tc.card, borderRadius:3, cursor:'pointer', color:tc.muted, display:'flex', alignItems:'center', justifyContent:'center' }}>
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" d="M6 2L2 5l4 3"/></svg>
            </button>
            <span>1</span>
            <button style={{ width:24, height:24, border:`1px solid ${tc.border}`, background:tc.card, borderRadius:3, cursor:'pointer', color:tc.muted, display:'flex', alignItems:'center', justifyContent:'center' }}>
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" d="M4 2l4 3-4 3"/></svg>
            </button>
          </div>
          <button style={{ width:28, height:28, border:`1px solid ${tc.border}`, background:tc.card, borderRadius:3, cursor:'pointer', color:tc.muted, display:'flex', alignItems:'center', justifyContent:'center' }}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
          </button>
        </div>
      </div>

      {/* Filter */}
      <div style={{ padding:'8px 16px', borderBottom:`1px solid ${tc.border}` }}>
        <div style={{ position:'relative', maxWidth:320 }}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={tc.muted} strokeWidth="2" style={{ position:'absolute', left:8, top:'50%', transform:'translateY(-50%)', pointerEvents:'none' }}><circle cx="11" cy="11" r="8"/><path strokeLinecap="round" d="M21 21l-4.35-4.35"/></svg>
          <input
            value={filter}
            onChange={e => setFilter(e.target.value)}
            placeholder="Filtrar por texto, propriedade ou valor"
            style={{
              width:'100%', padding:'5px 10px 5px 28px',
              border:`1px solid ${tc.border}`, borderRadius:tc.radiusSm,
              fontSize:12, fontFamily:t.fontBody, color:tc.text,
              background:tc.card, outline:'none',
            }}
          />
        </div>
      </div>

      {/* Column headers */}
      <div style={{ display:'grid', gridTemplateColumns:colTemplate, padding:'0 12px', height:34, alignItems:'center', gap:8, borderBottom:`2px solid ${tc.border}`, background:tc.bg }}>
        <div/>
        {columns.map((col,i) => (
          <div key={col.key} style={{ display:'flex', alignItems:'center', gap:3, justifyContent: col.align==='right'?'flex-end':'flex-start', cursor:'pointer' }}>
            <span style={{ fontSize:11, fontWeight:700, color:tc.muted, fontFamily:t.fontBody }}>{col.label}</span>
            <svg width="9" height="9" viewBox="0 0 9 9" fill={tc.muted} style={{ flexShrink:0 }}><path d="M4.5 1L7 4H2z"/><path d="M4.5 8L2 5h5z" opacity=".4"/></svg>
          </div>
        ))}
      </div>

      {/* Rows */}
      {filtered.map((row, ri) => {
        const key = getKey(row);
        const isSelected = selected === key;
        return (
          <div key={key} onClick={() => setSelected(isSelected ? null : key)} style={{
            display:'grid', gridTemplateColumns:colTemplate,
            padding:'0 12px', height:tc.rowH, alignItems:'center', gap:8,
            borderBottom: ri < filtered.length-1 ? `1px solid ${tc.borderSub}` : 'none',
            background: isSelected ? '#F2F8FF' : 'transparent',
            borderLeft: isSelected ? `3px solid ${tc.accent}` : '3px solid transparent',
            cursor:'pointer', transition:'background .1s',
          }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'center' }}>
              <div style={{
                width:14, height:14, borderRadius:'50%',
                border:`2px solid ${isSelected ? tc.accent : tc.border}`,
                background: isSelected ? tc.accent : 'transparent',
                display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0,
              }}>
                {isSelected && <div style={{ width:5, height:5, borderRadius:'50%', background:'#fff' }}/>}
              </div>
            </div>
            {columns.map(col => (
              <div key={col.key} style={{ textAlign: col.align==='right'?'right':'left', fontSize:13, fontFamily: col.mono ? t.fontMono : t.fontBody, color: col.link ? tc.accent : col.danger ? tc.danger : tc.text, fontWeight: col.bold ? 600 : 400, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                {col.render ? col.render(row) : row[col.key]}
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

    { label:'Receita Líquida', key:'receita_liquida', bold:true,  indent:0 },
    { label:'(-) CMV',         key:'cmv',             bold:false, indent:1, neg:true },
    { label:'Margem Bruta',    key:'margem_bruta',    bold:true,  indent:0, hl:true },
    { label:'Margem %',        key:'margem_pct',      bold:true,  indent:0, pct:true },
  ];
  const segs = ['combustivel','lubrificantes','servicos','conveniencia','_total'];
  const segLabels = { combustivel:'Combustível',lubrificantes:'Lubrificantes',servicos:'Serviços',conveniencia:'Conveniência',_total:'Total' };
  const data = window.MOCK.dre?.por_mes?.['2026-04']||{};

  return (
    <div style={{ background:tc.card, border:`1px solid ${tc.border}`, borderRadius:tc.radius }}>
      <div style={{ padding:'10px 16px', borderBottom:`1px solid ${tc.border}`, background:tc.bg }}>
        <span style={{ fontSize:14, fontWeight:700, color:tc.text, fontFamily:t.fontTitle }}>Demonstrativo de Resultado — Abril 2026</span>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:`220px repeat(${segs.length},1fr)`, padding:'0 16px', height:34, alignItems:'center', borderBottom:`2px solid ${tc.border}`, background:tc.bg }}>
        <div/>
        {segs.map(s=>(
          <div key={s} style={{ textAlign:'right', fontSize:11, fontWeight:s==='_total'?700:600, color:s==='_total'?tc.text:tc.muted, paddingRight:12, fontFamily:t.fontBody }}>{segLabels[s]}</div>
        ))}
      </div>
      {rows.map((row,ri)=>(
        <div key={row.key} style={{ display:'grid', gridTemplateColumns:`220px repeat(${segs.length},1fr)`, padding:'0 16px', height:row.bold?42:36, alignItems:'center', borderBottom:`1px solid ${tc.borderSub}`, background: row.hl?tc.successBg:ri%2===0?tc.card:'#FAFAFA' }}>
          <div style={{ fontSize:row.bold?13:12, fontWeight:row.bold?700:400, color:row.hl?tc.success:tc.text, paddingLeft:row.indent*14, fontFamily:t.fontBody }}>{row.label}</div>
          {segs.map(s=>{
            const val=(data[s]||{})[row.key]??0;
            return <div key={s} style={{ textAlign:'right', paddingRight:12, fontSize:row.bold?13:12, fontWeight:row.bold?700:400, fontFamily:t.fontMono, color:row.hl?tc.success:row.neg?tc.danger:s==='_total'?tc.text:tc.muted }}>{row.pct?fPct(val,2):fBRL(val)}</div>;
          })}
        </div>
      ))}
    </div>
  );
}

function PageSyncD({ t }) {
  const tc = t.c;
  const sync = window.MOCK.sync;
  const locs = window.MOCK.LOCATIONS;
  const sColor={online:tc.success,warning:tc.warning,failed:tc.danger};
  const sBg={online:tc.successBg,warning:tc.warningBg,failed:tc.dangerBg};

  const syncColumns = [
    { key:'location', label:'Unidade',    width:'140px' },
    { key:'status',   label:'Status',     width:'100px', render: row=><span style={{ fontSize:11,fontWeight:700,color:sColor[row.status]||tc.muted,background:sBg[row.status]||'transparent',padding:'2px 8px',borderRadius:3,fontFamily:t.fontBody }}>{row.status==='success'?'OK':row.status==='failed'?'Falhou':'Running'}</span> },
    { key:'inicio',   label:'Início',     width:'130px', mono:true, render: row=><span style={{fontFamily:t.fontMono,fontSize:12}}>{new Date(row.inicio).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span> },
    { key:'duracao',  label:'Duração',    width:'80px',  mono:true },
    { key:'registros',label:'Registros',  width:'80px',  align:'right', mono:true, render:row=><span style={{fontFamily:t.fontMono}}>{fNum(row.registros)}</span> },
    { key:'erro',     label:'Detalhe',    width:'1fr',   render:row=><span style={{color:row.erro?tc.danger:tc.muted,fontSize:11}}>{row.erro||'—'}</span> },
  ];

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      <div style={{ display:'flex', gap:12 }}>
        {locs.map(loc=>(
          <div key={loc.id} style={{ flex:1, background:tc.card, border:`1px solid ${tc.border}`, borderLeft:`4px solid ${sColor[loc.status]||tc.muted}`, borderRadius:tc.radius, padding:'12px 16px' }}>
            <div style={{ fontSize:13,fontWeight:700,color:tc.text,fontFamily:t.fontTitle,marginBottom:5 }}>{loc.nome}</div>
            <span style={{ fontSize:11,fontWeight:700,color:sColor[loc.status],background:sBg[loc.status],padding:'2px 8px',borderRadius:3,fontFamily:t.fontBody }}>
              {loc.status==='online'?'● Online':loc.status==='warning'?'⚠ Alerta':'✕ Offline'}
            </span>
          </div>
        ))}
      </div>
      <TableD t={t} title="Histórico de Sincronização" count={(sync?.historico||[]).length}
        columns={syncColumns} rows={sync?.historico||[]} getKey={row=>row.id}/>
    </div>
  );
}

// ─── DashboardPlex (full D) ───────────────────────────────────────────────────
function DashboardPlex() {
  const t = THEME_D;
  const tc = t.c;
  const [page, setPage] = React.useState('dashboard');
  const [collapsed, setCollapsed] = React.useState(false);
  const [period, setPeriod] = React.useState('Este mês');

  return (
    <div style={{ width:'100%', height:'100%', display:'flex', flexDirection:'column', fontFamily:t.fontBody, background:tc.bg, color:tc.text, fontSize:13, overflow:'hidden' }}>
      <TopBarD t={t}/>
      <div style={{ flex:1, display:'flex', overflow:'hidden', minHeight:0 }}>
        <SidebarD t={t} page={page} onNav={setPage} collapsed={collapsed} onToggle={()=>setCollapsed(c=>!c)}/>
        <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minWidth:0 }}>
          {/* Sub-header */}
          <div style={{ background:tc.header, borderBottom:`1px solid ${tc.border}`, padding:'0 24px', height:44, flexShrink:0, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <div style={{ display:'flex', gap:4 }}>
              {['Hoje','Esta semana','Este mês','Mês anterior'].map(p=>(
                <button key={p} onClick={()=>setPeriod(p)} style={{ padding:'4px 12px', border:`1px solid ${period===p?tc.accent:tc.border}`, borderRadius:tc.radiusSm, background:period===p?tc.accentBg:tc.card, color:period===p?tc.accent:tc.muted, fontSize:12, fontWeight:period===p?700:400, cursor:'pointer', fontFamily:t.fontBody }}>
                  {p}
                </button>
              ))}
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <select style={{ padding:'4px 8px', border:`1px solid ${tc.border}`, borderRadius:tc.radiusSm, background:tc.card, color:tc.text, fontSize:12, fontFamily:t.fontBody, cursor:'pointer', outline:'none' }}>
                <option>Todas as unidades</option>
                {window.MOCK.LOCATIONS.map(l=><option key={l.id}>{l.nome}</option>)}
              </select>
              <button style={{ display:'flex', alignItems:'center', gap:5, padding:'4px 12px', border:`1px solid ${tc.border}`, borderRadius:tc.radiusSm, background:tc.card, color:tc.muted, fontSize:12, cursor:'pointer', fontFamily:t.fontBody }}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                Sincronizar
              </button>
              <button style={{ padding:'4px 16px', background:tc.cta, color:'#fff', border:'none', borderRadius:tc.radiusSm, fontSize:12, fontWeight:700, cursor:'pointer', fontFamily:t.fontBody }}>
                Exportar relatório ▾
              </button>
            </div>
          </div>

          {/* Page content */}
          <div style={{ flex:1, overflowY:'auto', minHeight:0 }}>
            <BreadcrumbD t={t} page={page}/>
            <div style={{ padding:'0 24px 32px' }}>
              {(page==='dashboard'||page==='combustivel') && <PageVendasD t={t}/>}
              {page==='dre'  && <PageDRED t={t}/>}
              {page==='sync' && <PageSyncD t={t}/>}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

  return (
    <div className="explorer-canvas">

      {/* Header label */}
      <div style={{ textAlign:'center', paddingBottom:8 }}>
        <div style={{ fontSize:11, fontWeight:600, color:'#444', letterSpacing:'.12em', textTransform:'uppercase', marginBottom:6 }}>PostoInsight — Style Explorer v2</div>
        <div style={{ fontSize:13, color:'#666' }}>Clique nos itens do menu para navegar • Hover nos gráficos para ver dados</div>

          <div style={{ fontSize:12, color:'#555' }}>DM Sans · Sidebar #1E2636 · Conteúdo branco puro · Acento azul índigo · Bordas sharp 3px</div>

        <div className="dash-frame" style={{ boxShadow:'0 0 0 1px #2a2a2a, 0 24px 60px rgba(0,0,0,.5)' }}>

          <div style={{ fontSize:12, color:'#555' }}>Geist · Full dark #111318 · Cards #1A1E27 · Acento âmbar · Sem divisão dark/light</div>
        </div>
        <div className="dash-frame" style={{ boxShadow:'0 0 0 1px #2a2a2a, 0 24px 60px rgba(0,0,0,.6)' }}>

      </div>

      {/* Variant C */}
      <div>

          <div style={{ fontSize:12, color:'#555' }}>Source Sans 3 · Topbar #232F3E · Sidebar branca · Fundo #F2F3F3 · Radius 0 · Acento laranja CTA</div>

        <div className="dash-frame" style={{ boxShadow:'0 0 0 1px #2a2a2a, 0 24px 60px rgba(0,0,0,.4)' }}>
          <DashboardAWS themeKey="aws"/>

      </div>

      {/* Variant D */}
      <div>
        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:11, fontWeight:700, color:'#555', letterSpacing:'.1em', textTransform:'uppercase', marginBottom:4 }}>D — IBM Plex Sans + Inter · Sidebar retrátil · Tabela com seleção</div>
          <div style={{ fontSize:12, color:'#555' }}>IBM Plex Sans (títulos) · Inter (corpo) · Topbar #232F3E · Sidebar branca retrátil · Tabelas com filtro, sort e seleção por radio · Cards horizontais · Radius 4px</div>
        </div>
        <div className="dash-frame" style={{ boxShadow:'0 0 0 1px #2a2a2a, 0 24px 60px rgba(0,0,0,.4)' }}>

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
