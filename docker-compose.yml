services:
  postgres:
    image: postgres:16-alpine
    container_name: postoinsight-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postoinsight
      POSTGRES_PASSWORD: postoinsight
      POSTGRES_DB: postoinsight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postoinsight"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
