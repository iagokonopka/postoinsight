# apps/web/nginx.conf
# Serves the Vite SPA build (dist/) with correct SPA routing,
# cache headers and gzip compression.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml font/woff2;
    gzip_min_length 1024;

    # assets com hash — cache longo (1 ano, imutável)
    location ~* ^/assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html — nunca cachear (garante reload após deploy)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # SPA routing — qualquer path desconhecido devolve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}